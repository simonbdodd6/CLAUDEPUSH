<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coach's Eye · Boitsfort RFC</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#090d14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach's Eye">
  <style>
    /* ── MIDNIGHT STADIUM ─ Dark-first premium design system ───────────────── */
    /* Palette: Page #090d14 · Card #0f1724 · Accent #10b981                   */
    /* Fonts: Bebas Neue · DM Sans · JetBrains Mono                             */
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300..900;1,9..40,300..900&family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
      /* ── Core tokens ──────────────────────────────────────────────────────── */
      --ink:         #e2e8f0;
      --muted:       #64748b;
      --page:        #090d14;
      --panel:       #0f1724;
      --panel-2:     #141e2e;
      --line:        #1e2d3d;
      --line-soft:   #141e2e;

      /* Sidebar */
      --nav:         #060b12;
      --nav-soft:    #0b1420;

      /* Accents */
      --green:       #10b981;
      --green-soft:  rgba(16,185,129,0.12);
      --green-mid:   #059669;
      --amber:       #f59e0b;
      --amber-soft:  rgba(245,158,11,0.12);
      --red:         #ef4444;
      --red-soft:    rgba(239,68,68,0.12);
      --blue:        #60a5fa;
      --blue-soft:   rgba(96,165,250,0.12);

      /* Shadows */
      --shadow:      0 1px 3px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.4);
      --shadow-sm:   0 1px 2px rgba(0,0,0,0.4);
      --glow-green:  0 0 24px rgba(16,185,129,0.18);

      /* Typography */
      --font-body:    'DM Sans', ui-sans-serif, system-ui, sans-serif;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'JetBrains Mono', 'Fira Code', monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--page);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app-shell { display: grid; grid-template-columns: 272px minmax(0, 1fr); min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
      height: 100vh;
      padding: 22px 16px;
      color: #ecf5ef;
      overflow-y: auto;
      background:
        radial-gradient(circle at 15% 8%, rgba(16,185,129,0.08), transparent 40%),
        linear-gradient(180deg, #0a1520 0%, #060b12 100%);
      border-right: 1px solid rgba(16,185,129,0.07);
    }
    .brand { display: flex; gap: 11px; align-items: center; padding: 0 4px; }
    .brand-mark {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      background: var(--green);
      border-radius: 10px;
      font-weight: 900;
      font-size: 13px;
      color: #060b12;
      flex-shrink: 0;
      letter-spacing: -0.5px;
      box-shadow: var(--glow-green);
    }
    .brand strong { display: block; font-size: 16px; font-weight: 800; color: #fff; }
    .brand p { margin: 2px 0 0; color: #4a7a5e; font-size: 12px; }
    .sidebar-card p { margin: 2px 0 0; color: #4a7a5e; font-size: 12px; }

    /* Segmented control */
    .view-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 3px;
      border-radius: 9px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .view-switch button {
      min-height: 36px;
      border: 0;
      border-radius: 7px;
      color: rgba(255,255,255,0.38);
      background: transparent;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.14s ease;
    }
    .view-switch button.active {
      color: #060b12;
      background: var(--green);
      box-shadow: var(--glow-green);
    }
    .view-switch button:not(.active):hover {
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.06);
    }

    .auth-panel {
      display: grid;
      gap: 9px;
      padding: 11px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      background: rgba(0,0,0,0.35);
    }
    .auth-panel label { color: #4a7a5e; font-size: 12px; font-weight: 600; }
    .auth-panel input {
      min-height: 34px;
      border-color: rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #e2e8f0;
      font-size: 13px;
    }
    .auth-panel input::placeholder { color: #3a5a4a; }
    .auth-panel .btn { min-height: 34px; padding: 0 10px; font-size: 13px; }
    .auth-panel strong { display: block; color: #ecf5ef; font-size: 14px; }
    .auth-panel small { display: block; color: #4a7a5e; font-size: 12px; }
    .auth-tabs { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
    .auth-tab { background:rgba(255,255,255,0.04); border:none; border-radius:6px; color:rgba(255,255,255,0.35); font-size:12px; font-weight:600; padding:6px 4px; cursor:pointer; transition:background 0.15s; }
    .auth-tab.active { background:rgba(16,185,129,0.18); color:#10b981; }
    .join-code-banner { background:linear-gradient(135deg,#062a1c,#083d28); border-radius:12px; padding:16px 18px; margin-bottom:16px; color:#fff; border:1px solid rgba(16,185,129,0.18); }
    .join-code-banner h3 { margin:0 0 4px; font-size:15px; }
    .join-code-banner p { margin:0 0 12px; font-size:13px; opacity:0.85; }
    .join-code-value { font-size:28px; font-weight:800; letter-spacing:3px; background:rgba(16,185,129,0.14); border-radius:8px; padding:8px 14px; display:inline-block; margin-bottom:12px; font-family:var(--font-mono); color:#10b981; }
    .join-code-url { font-size:12px; opacity:0.55; word-break:break-all; margin-bottom:10px; }

    /* Nav */
    nav { display: grid; gap: 2px; }
    nav button {
      display: flex;
      gap: 9px;
      align-items: center;
      min-height: 40px;
      padding: 9px 10px;
      border: none;
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      background: transparent;
      text-align: left;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.12s ease;
    }
    nav button.active {
      background: rgba(16,185,129,0.13);
      color: #10b981;
      font-weight: 700;
      border-left: 2px solid var(--green);
      padding-left: 8px;
    }
    nav button:not(.active):hover {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.78);
    }

    .push-status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 11px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 9px;
      background: rgba(0,0,0,0.28);
      font-size: 12px;
      color: #4a7a5e;
    }
    .push-status-pill button {
      margin-top: 6px;
      width: 100%;
      min-height: 28px;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 700;
    }
    .push-dot { width: 7px; height: 7px; border-radius: 50%; background: #1e3a2e; flex-shrink: 0; }
    .push-dot.on { background: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.18); }
    .push-dot.off { background: #ef4444; }

    .sidebar-card {
      display: grid;
      gap: 5px;
      margin-top: auto;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      background: rgba(0,0,0,0.2);
    }
    .sidebar-card strong { color: #b0c8b8; font-size: 13px; }

    /* ── WORKSPACE ── */
    .workspace { min-width: 0; padding: 28px; background: var(--page); }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .eyebrow {
      color: var(--green);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .09em;
    }
    h1 { margin: 4px 0 0; font-size: clamp(26px, 3.6vw, 42px); line-height: 1.06; font-weight: 800; color: var(--ink); }
    h2 { margin: 0; font-size: 18px; font-weight: 800; color: var(--ink); }
    h3 { margin: 0; font-size: 14px; font-weight: 700; color: var(--ink); }
    p { margin: 0; }
    .muted { color: var(--muted); }

    .pill-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }
    .pill {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--muted);
      background: var(--panel);
      font-size: 12px;
      font-weight: 600;
    }
    .save-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(16,185,129,0.14); }
    .button-row { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 700;
      font-size: 13px;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .btn:hover { background: var(--panel-2); border-color: #263d52; }
    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: #060b12;
    }
    .btn.primary:hover { background: var(--green-mid); border-color: var(--green-mid); }
    .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
    .btn.ghost:hover { color: var(--ink); background: var(--panel); }
    .grid { display: grid; gap: 14px; }
    .stats-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .two-col { grid-template-columns: minmax(0, 1.15fr) minmax(300px, .85fr); }
    .three-col { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    /* ── CARDS ── */
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
      animation: fadeUp 0.22s ease both;
    }
    .stat-card { box-shadow: none; border-radius: 12px; }
    .stat-card small {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .stat-card strong {
      display: block;
      font-size: 44px;
      line-height: 1;
      font-weight: 400;
      font-family: var(--font-display);
      color: var(--ink);
      letter-spacing: 0.01em;
      animation: countUp 0.4s ease both;
    }
    .stat-card span { display: block; color: var(--muted); margin-top: 6px; font-size: 12px; }

    .list { display: grid; gap: 9px; }
    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 11px;
      background: var(--panel);
      transition: border-color 0.12s, background 0.12s;
    }
    .row:hover { border-color: #263d52; background: var(--panel-2); }
    .row strong { display: block; font-size: 14px; color: var(--ink); }
    .row small { color: var(--muted); font-size: 12px; }

    /* ── STATUS BADGES ── */
    .status {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 0 9px 0 7px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .available { color: #34d399; background: rgba(52,211,153,0.1); }
    .available::before { background: #34d399; }
    .unavailable, .injured { color: #f87171; background: rgba(248,113,113,0.1); }
    .unavailable::before, .injured::before { background: #f87171; }
    .maybe { color: #fbbf24; background: rgba(251,191,36,0.1); }
    .maybe::before { background: #fbbf24; }
    .no-reply { color: #64748b; background: rgba(100,116,139,0.1); }
    .no-reply::before { background: #64748b; }

    /* ── SECTION ANIMATION ── */
    .section { display: none; }
    .section.active {
      display: grid;
      gap: 14px;
      animation: fadeUp 0.24s ease both;
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(9px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
      50%       { box-shadow: 0 0 0 6px rgba(16,185,129,0.14); }
    }
    @keyframes ripple {
      to { transform: scale(2.5); opacity: 0; }
    }
    @keyframes slideInToast {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TYPOGRAPHY ── */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 11px 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }
    td { font-size: 14px; color: var(--ink); }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    label { display: grid; gap: 5px; color: var(--ink); font-size: 13px; font-weight: 700; }

    /* ── INPUTS ── */
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      background: var(--panel-2);
      color: var(--ink);
      font-size: 14px;
      transition: border-color 0.14s, box-shadow 0.14s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
    }
    input::placeholder, textarea::placeholder { color: #3a5065; }
    textarea { min-height: 100px; resize: vertical; }
    select option { background: #141e2e; color: var(--ink); }

    .schedule-card {
      display: grid;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      background: var(--panel);
      transition: border-color 0.12s;
    }
    .schedule-card:hover { border-color: #263d52; }
    .schedule-card button { justify-self: start; }

    .session-tabs { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }
    .session-tabs button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: var(--panel);
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
      transition: all 0.12s;
    }
    .session-tabs button.active {
      border-color: var(--green);
      background: var(--green);
      color: #060b12;
    }
    .session-detail-header {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .session-detail-header article {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 11px;
      background: var(--panel-2);
    }
    .session-detail-header span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .session-detail-header strong { display: block; font-size: 22px; line-height: 1; font-weight: 800; color: var(--ink); }

    .training-player-list {
      display: grid;
      gap: 7px;
      margin-top: 14px;
      max-height: 500px;
      overflow: auto;
      padding-right: 4px;
    }
    .training-player-list button {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: var(--panel);
      color: var(--ink);
      text-align: left;
      transition: border-color 0.12s;
    }
    .training-player-list button.active { border-color: var(--green); background: rgba(16,185,129,0.07); }
    .training-player-list span { display: block; color: var(--muted); font-size: 12px; }

    .register-stack { display: grid; gap: 11px; margin-top: 14px; }
    .register-card { border: 1px solid var(--line); border-radius: 9px; padding: 11px; background: var(--panel); }
    .register-head, .compact-player-heading {
      display: flex; justify-content: space-between; gap: 10px; align-items: center;
    }
    .mini-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      margin-top: 9px;
    }
    .mini-list button {
      display: flex;
      justify-content: space-between;
      gap: 7px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      background: var(--panel);
      text-align: left;
      font-size: 13px;
      color: var(--ink);
    }
    .mini-list .mini-status {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      border-radius: 999px;
      padding: 0 7px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .not-coming-panel {
      margin-top: 11px;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 9px;
      background: rgba(239,68,68,0.04);
    }
    .needs-chasing-panel {
      margin-top: 11px;
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      padding: 9px;
      background: rgba(245,158,11,0.04);
    }
    .training-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 9px;
    }
    .training-metrics article { border: 1px solid var(--line); border-radius: 8px; padding: 9px; background: var(--panel-2); }
    .training-metrics span { display: block; color: var(--muted); font-size: 12px; }
    .training-metrics strong { display: block; font-size: 19px; font-weight: 800; color: var(--ink); }

    .player-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
      gap: 14px;
    }
    .availability-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .availability-buttons button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
      transition: all 0.14s;
    }
    .availability-buttons button.active.available { border-color: #10b981; background: rgba(16,185,129,0.14); color: #34d399; }
    .availability-buttons button.active.unavailable,
    .availability-buttons button.active.injured { border-color: #ef4444; background: rgba(239,68,68,0.14); color: #f87171; }
    .availability-buttons button.active.maybe { border-color: #f59e0b; background: rgba(245,158,11,0.14); color: #fbbf24; }

    /* ── PITCH ── */
    .pitch {
      position: relative;
      min-height: 420px;
      overflow: hidden;
      border-radius: 10px;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.025) 0,
          rgba(255,255,255,0.025) 28px,
          transparent 28px,
          transparent 56px
        ),
        linear-gradient(180deg, #0f4a28 0%, #145e34 50%, #0f4a28 100%);
      border: 7px solid #0a3319;
      box-shadow: inset 0 0 50px rgba(0,0,0,0.45);
    }
    .pitch-inner { position: absolute; inset: 18px; border: 2px solid rgba(255,255,255,0.88); border-radius: 2px; }
    .pitch-line { position: absolute; left: 18px; right: 18px; height: 2px; background: rgba(255,255,255,0.8); }
    .slot {
      position: absolute;
      transform: translate(-50%, -50%);
      min-width: 86px;
      max-width: 112px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 7px;
      padding: 6px 7px;
      background: rgba(9,13,20,0.92);
      color: #fff;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.55);
    }
    .slot small { display: block; font-weight: 900; color: #10b981; font-size: 10px; }
    .slot span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }

    .message-bubble { border: 1px solid var(--line); border-radius: 9px; padding: 13px; background: var(--panel); }
    .message-bubble.unread { border-color: rgba(16,185,129,0.28); background: rgba(16,185,129,0.05); }
    .message-meta { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 12px; }
    .thread-reply { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 7px; margin-top: 9px; }
    .automation-grid { display: grid; gap: 9px; margin-top: 14px; }
    .automation-card { display: grid; gap: 9px; border: 1px solid var(--line); border-radius: 9px; padding: 11px; background: var(--panel-2); }
    .history-bar { height: 9px; overflow: hidden; border-radius: 999px; background: var(--line); }
    .history-bar span { display: block; height: 100%; background: var(--green); border-radius: 999px; }

    /* ── PUSH BANNER (player side) ── */
    .push-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 10px;
      background: rgba(16,185,129,0.06);
    }
    .push-banner .push-icon { font-size: 22px; flex-shrink: 0; }
    .push-banner .push-text strong { display: block; font-size: 14px; color: var(--ink); }
    .push-banner .push-text small { color: var(--muted); font-size: 12px; }
    .push-subscribed { border-color: rgba(16,185,129,0.24); background: rgba(16,185,129,0.06); }
    .push-denied { border-color: rgba(239,68,68,0.22); background: rgba(239,68,68,0.05); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      background: #141e2e;
      border: 1px solid rgba(16,185,129,0.18);
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(16,185,129,0.08);
    }
    .toast.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: slideInToast 0.22s ease both;
    }

    .hidden { display: none !important; }

    /* ── OVERVIEW UPGRADES ── */
    .fixture-hero { border:1px solid rgba(16,185,129,0.18); border-radius:12px; padding:20px; background:linear-gradient(135deg,#0a1820 0%,#0d2232 100%); color:#ecf5ef; }
    .fixture-hero .eyebrow { color:#10b981; }
    .fixture-hero h3 { color:#fff; font-size:20px; margin:6px 0 4px; }
    .fixture-hero .pill { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.1); color:#6b8a78; }
    .fixture-meta { display:flex; gap:18px; margin-top:12px; flex-wrap:wrap; }
    .fixture-meta span { font-size:13px; color:#4a7a5e; }
    .fixture-meta strong { color:#e2e8f0; }
    .pkg-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-top:14px; }
    .pkg-stat { padding:14px 12px; background:var(--panel); text-align:center; }
    .pkg-stat strong { display:block; font-size:30px; font-weight:400; font-family:var(--font-display); color:var(--green); line-height:1; }
    .pkg-stat small { color:var(--muted); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; display:block; margin-top:4px; }
    .auto-queue-row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); font-size:13px; }
    .auto-queue-row:last-child { border-bottom:0; }
    .auto-badge { min-height:20px; padding:0 8px; border-radius:999px; font-size:11px; font-weight:700; display:inline-flex; align-items:center; }
    .auto-active { background:rgba(16,185,129,0.14); color:#10b981; }
    .auto-paused { background:rgba(245,158,11,0.14); color:var(--amber); }
    .msgs-sent-stat { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-top:14px; }
    .msgs-sent-stat article { border:1px solid var(--line); border-radius:9px; padding:12px; text-align:center; background:var(--panel-2); }
    .msgs-sent-stat strong { display:block; font-size:24px; font-weight:800; }
    .msgs-sent-stat small { color:var(--muted); font-size:12px; }

    /* ── TRAINING HERO ── */
    .training-hero { border:1px solid var(--line); border-radius:12px; padding:24px 28px; background:linear-gradient(135deg,rgba(16,185,129,0.05) 0%,var(--panel) 60%); margin-bottom:18px; display:grid; grid-template-columns:1fr auto; gap:24px; align-items:center; }
    .training-hero h1 { font-size:clamp(20px,3vw,30px); margin:6px 0 10px; line-height:1.15; }
    .training-hero p { color:var(--muted); font-size:13px; max-width:580px; }
    .training-hero-stats { display:grid; grid-template-columns:repeat(3,110px); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:10px; overflow:hidden; flex-shrink:0; }
    .training-stat { background:var(--panel); padding:14px 12px; text-align:center; }
    .training-stat .lbl { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.09em; color:var(--green); display:block; margin-bottom:4px; }
    .training-stat strong { display:block; font-size:30px; font-weight:400; font-family:var(--font-display); line-height:1; color:var(--ink); }
    .training-stat small { color:var(--muted); font-size:11px; display:block; margin-top:4px; }

    /* ── SESSION CARD TABS ── */
    .session-card-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-bottom:18px; }
    .session-card-tab { border:2px solid var(--line); border-radius:10px; padding:14px 16px; cursor:pointer; background:var(--panel); text-align:left; transition:all 0.14s; color:var(--ink); }
    .session-card-tab:hover:not(.active) { border-color:#263d52; background:var(--panel-2); }
    .session-card-tab.active { border-color:var(--green); background:rgba(16,185,129,0.07); }
    .session-card-tab .sc-time { display:block; font-size:12px; color:var(--muted); font-weight:600; margin-bottom:5px; }
    .session-card-tab.active .sc-time { color:var(--green); }
    .session-card-tab strong { display:block; font-size:15px; font-weight:800; color:var(--ink); }

    /* ── INTENSITY BADGE & LOAD BAR ── */
    .intensity-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .intensity-badge { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.09em; color:var(--amber); }
    .load-pct { font-size:14px; font-weight:800; color:var(--green); }
    .load-bar-wrap { height:6px; border-radius:999px; background:var(--line); overflow:hidden; margin:10px 0 16px; }
    .load-bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,var(--green) 0%,var(--amber) 100%); transition:width 0.3s; }

    /* ── EDITABLE TIME BLOCK FORMS ── */
    .block-form { border:1px solid var(--line); border-radius:10px; padding:14px 16px; background:var(--panel); margin-bottom:10px; }
    .block-time-row { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
    .block-time-input { width:80px; border:1px solid var(--line); border-radius:7px; padding:7px 9px; font-size:13px; font-weight:700; color:var(--green); text-align:center; background:var(--panel-2); }
    .block-time-sep { color:var(--muted); font-weight:700; flex-shrink:0; }
    .block-form label { font-size:12px; font-weight:700; color:var(--ink); display:grid; gap:4px; }
    .block-form input, .block-form textarea, .block-form select { font-size:13px; }
    .block-form textarea { min-height:72px; }
    .goal-tag { display:inline-flex; align-items:center; gap:5px; min-height:26px; padding:0 10px; border-radius:999px; background:rgba(16,185,129,0.12); color:#10b981; font-size:12px; font-weight:600; }
    .goal-tag::before { content:"✓"; font-weight:800; }

    /* ── DRILL BOARD ── */
    .drill-board { display:grid; gap:14px; }
    .drill-board-header p { color:var(--muted); font-size:13px; margin-top:4px; }
    .active-drill-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:8px; }
    .drill-tools-row { display:flex; gap:6px; flex-wrap:wrap; padding:10px 12px; border:1px solid var(--line); border-radius:9px; background:var(--panel-2); }
    .dtool { min-height:30px; padding:0 12px; border:1px solid var(--line); border-radius:7px; background:var(--panel); color:var(--ink); font-size:12px; font-weight:700; cursor:pointer; transition:all 0.1s; }
    .dtool.active { background:var(--green); color:#060b12; border-color:var(--green); }
    .dtool.del { color:var(--red); border-color:rgba(239,68,68,0.25); }
    .dtool.del:hover { background:var(--red); color:#fff; }
    .tactic-color { width:22px; height:22px; border-radius:50%; border:2px solid rgba(255,255,255,0.12); cursor:pointer; flex-shrink:0; transition:transform 0.1s; }
    .tactic-color:hover { transform:scale(1.2); }
    .tactics-canvas { display:block; width:100%; background:linear-gradient(180deg,#0f4a28 0%,#145e34 50%,#0f4a28 100%); cursor:crosshair; touch-action:none; border-radius:0 0 8px 8px; }

    /* ── COACH SHEET TABLE ── */
    .coach-sheet { border:1px solid var(--line); border-radius:10px; background:var(--panel); overflow:hidden; }
    .coach-sheet-hdr { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid var(--line); background:var(--panel-2); }
    .coach-sheet-hdr h3 { margin:0; }
    .cs-table { width:100%; border-collapse:collapse; font-size:12px; }
    .cs-table th { padding:8px 12px; background:var(--panel-2); border-bottom:2px solid var(--line); color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.06em; text-align:left; }
    .cs-table td { padding:8px 12px; border-bottom:1px solid var(--line); vertical-align:top; color:var(--ink); }
    .cs-table tr:last-child td { border-bottom:0; }
    .cs-time-cell { font-weight:800; color:var(--green); white-space:nowrap; font-size:11px; }

    /* ── TRAINING ARCHIVE ── */
    .archive-item { padding:12px 16px; border-bottom:1px solid var(--line); cursor:pointer; }
    .archive-item:last-child { border-bottom:0; }
    .archive-item:hover { background:var(--panel-2); }
    .archive-meta { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .archive-item strong { font-size:14px; color:var(--ink); }
    .archive-item p { font-size:12px; color:var(--muted); margin-top:3px; }

    /* ── TACTICS BOARD ── */
    .tactics-wrap { border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    .tactics-toolbar { display:flex; gap:6px; flex-wrap:wrap; padding:10px 12px; border-bottom:1px solid var(--line); background:var(--panel-2); align-items:center; }
    .tactic-tool { min-height:30px; padding:0 11px; border:1px solid var(--line); border-radius:7px; background:var(--panel); font-size:12px; font-weight:700; color:var(--ink); cursor:pointer; transition:all 0.12s; }
    .tactic-tool.active { background:var(--green); color:#060b12; border-color:var(--green); }

    /* ── COACH SHEET (print) ── */
    .coach-sheet-blocks { display:grid; gap:6px; }
    .csblock { display:grid; grid-template-columns:52px minmax(0,1fr) 70px; gap:8px; align-items:start; padding:6px 0; border-bottom:1px solid var(--line); font-size:12px; color:var(--ink); }
    .csblock:last-child { border-bottom:0; }
    .csblock .cs-time { font-weight:800; color:var(--green); }
    .csblock .cs-tag { display:inline-flex; min-height:18px; padding:0 7px; border-radius:999px; background:rgba(16,185,129,0.12); color:#10b981; font-size:10px; font-weight:700; align-items:center; justify-self:end; }

    /* ── VIDEO LIBRARY ── */
    .video-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
    .video-card { border:1px solid var(--line); border-radius:9px; overflow:hidden; background:var(--panel); cursor:pointer; transition:box-shadow 0.12s, border-color 0.12s; }
    .video-card:hover { box-shadow:var(--shadow); border-color:#263d52; }
    .video-thumb { height:88px; background:linear-gradient(135deg,#0a1520 0%,#0d2232 100%); display:flex; align-items:center; justify-content:center; position:relative; }
    .play-btn { width:34px; height:34px; border-radius:50%; background:rgba(16,185,129,0.88); display:flex; align-items:center; justify-content:center; font-size:13px; color:#060b12; }
    .video-dur { position:absolute; bottom:5px; right:7px; background:rgba(0,0,0,0.75); color:#fff; font-size:10px; font-weight:700; padding:1px 5px; border-radius:4px; }
    .video-card-body { padding:8px 10px; }
    .video-card-body strong { display:block; font-size:12px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink); }
    .video-card-body small { color:var(--muted); font-size:11px; }
    .link-row { display:grid; grid-template-columns:minmax(0,1fr) 80px auto; gap:8px; align-items:center; padding:9px 11px; border:1px solid var(--line); border-radius:8px; background:var(--panel); }
    .link-row a { font-size:13px; font-weight:600; color:var(--blue); text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; }
    .link-row small { color:var(--muted); font-size:11px; display:block; }
    .link-cat { display:inline-flex; min-height:18px; padding:0 7px; border-radius:999px; background:var(--blue-soft); color:var(--blue); font-size:10px; font-weight:700; align-items:center; }

    /* ── SEASON PLAN ── */
    .period-row { display:grid; grid-template-columns:100px minmax(0,1fr) 110px auto; gap:10px; align-items:center; border:1px solid var(--line); border-radius:8px; padding:10px 12px; background:var(--panel); font-size:13px; color:var(--ink); }
    .period-badge { display:inline-flex; min-height:22px; padding:0 10px; border-radius:999px; font-size:11px; font-weight:700; align-items:center; }
    .period-preseason { background:var(--blue-soft); color:var(--blue); }
    .period-competition { background:var(--green-soft); color:#10b981; }
    .period-transition { background:var(--amber-soft); color:var(--amber); }

    /* ── MATCHDAY BIG PITCH ── */
    .pitch-big { position:relative; min-height:700px; overflow:hidden; border-radius:12px;
      background: repeating-linear-gradient(180deg,rgba(255,255,255,0.022) 0,rgba(255,255,255,0.022) 34px,transparent 34px,transparent 68px),
      linear-gradient(180deg,#0f4a28 0%,#145e34 50%,#0f4a28 100%);
      border:8px solid #0a3319; box-shadow:inset 0 0 70px rgba(0,0,0,0.55); }
    .pitch-big .pitch-inner { position:absolute; inset:18px; border:2px solid rgba(255,255,255,0.85); border-radius:2px; }
    .pitch-big .pitch-line { position:absolute; left:18px; right:18px; height:2px; background:rgba(255,255,255,0.7); }
    .slot-big { position:absolute; transform:translate(-50%,-50%); width:88px; text-align:center; cursor:pointer; }
    .slot-photo { width:52px; height:52px; border-radius:50%; margin:0 auto 3px; border:3px solid rgba(255,255,255,0.9); background:rgba(9,13,20,0.92); display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; box-shadow:0 3px 10px rgba(0,0,0,0.65); position:relative; }
    .slot-photo img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .slot-num { position:absolute; top:-4px; right:-4px; width:18px; height:18px; border-radius:50%; background:var(--green); color:#060b12; font-size:10px; font-weight:900; display:flex; align-items:center; justify-content:center; border:2px solid #090d14; }
    .slot-name-lbl { font-size:10px; font-weight:700; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.9); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .slot-name-input { display:block; width:100%; font-size:11px; font-weight:700; text-align:center; background:rgba(9,13,20,0.9); color:#e2e8f0; border:1px solid rgba(255,255,255,0.2); border-radius:5px; padding:4px 4px; margin-top:3px; outline:none; box-sizing:border-box; box-shadow:0 1px 4px rgba(0,0,0,0.6); }
    .slot-name-input:focus { background:rgba(9,13,20,1); border-color:var(--green); box-shadow:0 0 0 2px rgba(16,185,129,0.22); }
    .slot-name-input::placeholder { color:#3a5065; font-weight:400; }
    .slot-big.drag-over { outline:3px dashed rgba(255,255,255,0.5); outline-offset:3px; border-radius:8px; }
    .avail-template-card { border:2px solid var(--green); border-radius:12px; padding:20px 22px; background:linear-gradient(135deg,rgba(16,185,129,0.06) 0%,var(--panel) 80%); margin-bottom:18px; }
    .training-gs-table { width:100%; border-collapse:collapse; font-size:14px; }
    .training-gs-table th { padding:10px 12px; background:var(--panel-2); border-bottom:2px solid var(--line); color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.06em; text-align:left; white-space:nowrap; }
    .training-gs-table td { padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; color:var(--ink); }
    .training-gs-table tr:last-child td { border-bottom:0; }
    .training-gs-table tr:hover td { background:var(--panel-2); }
    .training-gs-table textarea { width:100%; font-size:14px; border:1px solid var(--line); border-radius:7px; padding:8px 10px; resize:vertical; min-height:76px; font-family:inherit; line-height:1.5; background:var(--panel-2); color:var(--ink); }
    .training-gs-table textarea:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 2px rgba(16,185,129,0.12); }
    .gs-time-input { width:84px; border:2px solid var(--line); border-radius:7px; padding:8px 10px; font-size:15px; font-weight:800; color:var(--green); text-align:center; background:var(--panel-2); }
    .gs-time-input:focus { outline:none; border-color:var(--green); background:var(--panel); }
    .gs-sm-input { width:100%; border:1px solid var(--line); border-radius:7px; padding:7px 10px; font-size:13px; background:var(--panel-2); color:var(--ink); }
    .player-photo-wrap { position:relative; width:36px; height:36px; flex-shrink:0; }
    .player-photo-wrap img { width:36px; height:36px; border-radius:50%; object-fit:cover; }
    .player-photo-wrap .photo-badge { position:absolute; bottom:-2px; right:-2px; width:16px; height:16px; border-radius:50%; background:var(--green); border:2px solid var(--panel); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:9px; color:#060b12; }
    .squad-player-drag { cursor:grab; padding:8px 10px; border:1px solid var(--line); border-radius:8px; display:flex; align-items:center; gap:8px; background:var(--panel); transition:box-shadow 0.12s; color:var(--ink); }
    .squad-player-drag:hover { box-shadow:var(--shadow); border-color:#263d52; }
    .squad-player-drag:active { cursor:grabbing; }
    .bench-strip { display:grid; grid-template-columns:repeat(8,minmax(0,1fr)); gap:6px; margin-top:10px; }
    .bench-slot { border:1px dashed rgba(255,255,255,0.12); border-radius:8px; padding:8px 5px; text-align:center; background:rgba(0,0,0,0.45); }
    .bench-slot small { display:block; color:rgba(255,255,255,0.3); font-size:10px; font-weight:700; }
    .bench-slot span { display:block; color:#fff; font-size:10px; font-weight:600; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .bench-slot input { background:transparent; border:0; color:#e2e8f0; font-size:10px; font-weight:600; width:100%; text-align:center; padding:0; }
    .bench-slot input::placeholder { color:rgba(255,255,255,0.18); }
    .sub-table th { background:var(--panel-2); font-size:11px; }
    .sub-tag { display:inline-flex; min-height:20px; padding:0 8px; border-radius:999px; background:var(--amber-soft); color:var(--amber); font-size:11px; font-weight:700; align-items:center; }
    .export-bar { display:flex; gap:8px; flex-wrap:wrap; padding:12px 0; border-top:1px solid var(--line); margin-top:14px; }

    /* ── MEDICAL ── */
    .med-overview-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }
    .med-stat { border:1px solid var(--line); border-radius:10px; padding:14px; text-align:center; background:var(--panel); }
    .med-stat strong { display:block; font-size:36px; font-weight:400; font-family:var(--font-display); line-height:1; color:var(--ink); }
    .med-stat small { color:var(--muted); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; display:block; margin-top:5px; }
    .rehab-card { border:1px solid var(--line); border-radius:10px; padding:14px; background:var(--panel); }
    .rehab-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px; }
    .rehab-bar { height:6px; border-radius:999px; background:var(--line); overflow:hidden; margin-top:6px; }
    .rehab-bar span { display:block; height:100%; border-radius:999px; background:var(--green); transition:width 0.3s; }
    .treatment-row { display:grid; grid-template-columns:85px minmax(0,1fr) 90px auto; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px; color:var(--ink); }
    .treatment-row:last-child { border-bottom:0; }
    .med-msg-card { border:1px solid var(--line); border-radius:9px; padding:12px; background:var(--panel); }
    .med-msg-card + .med-msg-card { margin-top:8px; }

    /* ── LIVE MESSAGING PANELS ── */
    .live-sched-row { padding:10px 0; border-bottom:1px solid var(--line); }
    .live-sched-row:last-child { border-bottom:0; }
    .live-sched-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--line); flex-shrink:0; }
    .live-sched-dot.on  { background:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,0.18); }
    .live-sched-dot.off { background:#1e3450; }
    .live-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; background:var(--panel-2); color:var(--muted); letter-spacing:.02em; }
    .live-badge.sched { background:rgba(16,185,129,0.12); color:#10b981; }
    .live-badge.adhoc { background:var(--amber-soft); color:var(--amber); }

    /* ── COLLAPSIBLE SERVER PANELS ── */
    .srv-panel { border-bottom:1px solid var(--line); }
    .srv-panel:last-child { border-bottom:none; }
    .srv-panel > summary {
      cursor:pointer; padding:13px 18px; font-weight:700; font-size:14px;
      list-style:none; display:flex; align-items:center; gap:8px;
      user-select:none; -webkit-user-select:none; color:var(--ink);
      transition: background 0.12s;
    }
    .srv-panel > summary::-webkit-details-marker { display:none; }
    .srv-panel > summary::after {
      content:'▼'; margin-left:auto; font-size:10px; color:var(--muted);
      transition:transform .2s;
    }
    .srv-panel[open] > summary::after { transform:rotate(180deg); }
    .srv-panel > summary:hover { background:var(--panel-2); }
    .srv-panel-body { padding:0 18px 16px; }

    /* ── PLAYER DATABASE ── */
    .db-toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
    .filter-pill { min-height:30px; padding:0 13px; border:1px solid var(--line); border-radius:999px; background:var(--panel); color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all 0.12s; }
    .filter-pill.active { background:var(--green); color:#060b12; border-color:var(--green); }
    .consent-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; vertical-align:middle; margin-right:4px; }
    .c-yes { background:#10b981; } .c-no { background:#ef4444; } .c-pending { background:#f59e0b; }
    .add-player-panel { border:1px solid rgba(16,185,129,0.22); border-radius:10px; padding:16px; background:rgba(16,185,129,0.05); margin-bottom:14px; }
    .add-player-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2d3d; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #263d52; }

    /* ── SELECTION ── */
    ::selection { background: rgba(16,185,129,0.22); color: #e2e8f0; }

    /* ── FOCUS RINGS ── */
    :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

    /* ── SHIMMER SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--panel) 25%, var(--panel-2) 50%, var(--panel) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: 6px;
    }

    @media (max-width: 980px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .workspace { padding: 16px; }
      .topbar, .player-hero, .two-col { grid-template-columns: 1fr; display: grid; }
      .stats-grid, .three-col, .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .session-detail-header, .mini-list, .training-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    // ─── STATE ────────────────────────────────────────────────────────────────
    let state = loadState();

    // ─── TOAST ────────────────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById("toast");
      if (!el) return;
      el.textContent = msg;
      el.classList.add("visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("visible"), 2200);
    }

    // ─── PERSISTENCE ─────────────────────────────────────────────────────────
    function safeParseState(raw, source) {
      if (!raw) return null;
      try { return JSON.parse(raw); }
      catch (e) { console.warn(`Coach Eye ignored corrupt ${source} state`, e); return null; }
    }

    function readStoredState() {
      const primary = safeParseState(window.localStorage.getItem(STORAGE_KEY), "primary");
      if (primary) return primary;
      const backup = safeParseState(window.localStorage.getItem(BACKUP_KEY), "backup");
      return backup || structuredClone(defaultState);
    }

    function loadState() { return normalizeState(readStoredState()); }

    function normalizeState(input) {
      const next = { ...structuredClone(defaultState), ...input };
      next.notification = ""; // never restore stale notification across sessions
      next.users = input.users || structuredClone(testAccounts);
      next.currentUserId = input.currentUserId || "coach-demo";
      next.selectedMessagePlayerId = input.selectedMessagePlayerId || next.selectedPlayerId || "test-simon";
      next.meta = {
        revision: Number(input.meta?.revision || 1),
        savedAt:  input.meta?.savedAt  || "Unknown",
        savedBy:  input.meta?.savedBy  || next.currentUserId || "unknown"
      };
      next.players = (input.players || defaultState.players).map((player, i) => ({
        ...defaultState.players[i % defaultState.players.length],
        ...player,
        history:      player.history      || ["no-reply"],
        blockedDates: player.blockedDates || []
      }));
      next.messages = (input.messages || defaultState.messages).map(m => ({
        playerId: "squad", sessionId: "week", delivery: m.unread ? "delivered" : "read", replies: [], ...m
      }));
      next.automationRules    = input.automationRules    || structuredClone(defaultState.automationRules);
      next.availabilityRequests = (input.availabilityRequests || defaultState.availabilityRequests).map(r => ({
        messageIds: [], status: "sent", ...r
      }));
      next.masterFeed       = input.masterFeed       || structuredClone(defaultState.masterFeed);
      next.trainingActiveSession = input.trainingActiveSession || "tue";
      next.trainingBlocks   = input.trainingBlocks   || structuredClone(defaultState.trainingBlocks);
      next.tacticsDrawings  = input.tacticsDrawings  || { tue:null, thu:null, game:null };
      next.clubVideos       = input.clubVideos       || structuredClone(defaultState.clubVideos);
      next.coachingLinks    = input.coachingLinks    || structuredClone(defaultState.coachingLinks);
      next.seasonPlan       = input.seasonPlan       || structuredClone(defaultState.seasonPlan);
      next.formationNames   = input.formationNames   || {};
      next.fphotoIds        = input.fphotoIds        || {};
      next.availabilityTemplate = input.availabilityTemplate ?? defaultState.availabilityTemplate;
      next.autoSendEnabled  = input.autoSendEnabled  ?? false;
      next.autoSendSchedule = input.autoSendSchedule || { day:"monday", time:"09:00" };
      next.trainingAutoSend = input.trainingAutoSend ?? false;
      next.benchPlayers     = input.benchPlayers     || Array(8).fill("");
      // Migrate existing blocks to have coach + keyFocus fields
      ["tue","thu","game"].forEach(sid => {
        (next.trainingBlocks[sid] || []).forEach(b => {
          if (b.coach    === undefined) b.coach    = "";
          if (b.keyFocus === undefined) b.keyFocus = "";
        });
      });
      // Migrate players to have photo field
      next.players.forEach(p => { if (p.photo === undefined) p.photo = ""; });
      next.subPlan          = input.subPlan          || structuredClone(defaultState.subPlan);
      next.treatmentLogs    = input.treatmentLogs    || structuredClone(defaultState.treatmentLogs);
      next.medicalNotes     = input.medicalNotes     || structuredClone(defaultState.medicalNotes);
      next.coachNotes       = input.coachNotes       || "";
      next.playerFilter     = input.playerFilter     || "all";
      next.showAddPlayer    = false; // never restore open form across sessions
      const user = next.users.find(u => u.id === next.currentUserId);
      if (user?.role === "player") {
        next.activeView = "player";
        next.selectedPlayerId = user.playerId;
      }
      return next;
    }

    function saveState(message = "Saved in this browser") {
      try {
        state.meta = {
          ...(state.meta || {}),
          revision: Number(state.meta?.revision || 0) + 1,
          savedAt:  new Date().toISOString(),
          savedBy:  state.currentUserId || "unknown"
        };
        const payload = JSON.stringify(state);
        // Critical persistence guard: write the backup first so a refresh during
        // the primary write still has a recoverable copy. The future Firebase
        // path should keep this same shape as the offline queue fallback.
        window.localStorage.setItem(BACKUP_KEY, payload);
        window.localStorage.setItem(STORAGE_KEY, payload);
        const el = document.getElementById("saveStatus");
        if (el) el.textContent = `${message} · rev ${state.meta.revision}`;
        return true;
      } catch (e) {
        console.error("Coach Eye save failed", e);
        const el = document.getElementById("saveStatus");
        if (el) el.textContent = "Could not save in this browser";
        return false;
      }
    }

    function notify(message) {
      state.notification = message;
      addMasterFeed(message, "System");
      saveState(message);
      render();
    }

    function addMasterFeed(event, detail = "") {
      state.masterFeed.unshift({
        id: `feed-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        event, detail, time: "Just now"
      });
      state.masterFeed = state.masterFeed.slice(0, 30);

    // ─── PUSH NOTIFICATIONS ──────────────────────────────────────────────────
    let swRegistration = null;
    let pushSubscription = null;

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
    }

    async function initServiceWorker() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      try {
        const configResponse = await fetch('/api/config');
        const config = await configResponse.json();
        vapidPublicKey = config.vapidPublicKey || "";
        pushConfigured = Boolean(config.pushConfigured);
        if (!pushConfigured) pushConfigurationError = "Push needs Vercel environment setup";
        swRegistration = await navigator.serviceWorker.register('/sw.js');
        // Check existing subscription
        pushSubscription = await swRegistration.pushManager.getSubscription();
        renderPushSidebar();
      } catch (e) {
        console.warn('SW registration failed:', e);
      }
    }

    async function subscribePush(playerName) {
      if (!swRegistration) return showToast("Service worker not ready yet");
      if (!pushConfigured || !vapidPublicKey) return showToast(pushConfigurationError || "Notifications are not configured yet");
      try {
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          showToast("Notifications blocked — check browser settings");
          renderPushSidebar();
          return;
        }
        pushSubscription = await swRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(vapidPublicKey)
        });
        // Send subscription to server
        const res = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subscription: pushSubscription.toJSON(), label: playerName || 'Player' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Could not save device registration');
        showToast(`Notifications on — ${data.count || 1} subscriber(s) total`);
        renderPushSidebar();
        setTimeout(() => renderPushStatusCard(), 300);
      } catch (e) {
        console.error('Subscribe failed:', e);
        showToast("Could not enable notifications: " + e.message);
      }
    }

    async function unsubscribePush() {
      if (!pushSubscription) return;
      try {
        await fetch('/api/subscribe', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: pushSubscription.endpoint })
        });
        await pushSubscription.unsubscribe();
        pushSubscription = null;
        showToast("Notifications disabled");
        renderPushSidebar();
        setTimeout(() => renderPushStatusCard(), 300);
      } catch (e) {
        console.error('Unsubscribe failed:', e);
      }
    }

    async function sendPushToPlayers(title, body, opts = {}) {
      const { type, sessionId, targetLabel, audience } = opts;
      try {
        const payload = { title, body, from: currentUser().name };
        if (type)        payload.type        = type;
        if (sessionId)   payload.sessionId   = sessionId;
        if (targetLabel) payload.targetLabel = targetLabel;
        if (audience)    payload.audience    = audience;
        const res = await fetch('/api/push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Push delivery failed");
        if (data.sent > 0) showToast(`Push sent to ${data.sent} device${data.sent > 1 ? 's' : ''} ✓`);
        else if (data.total === 0) showToast("No subscribers yet — players need to enable notifications");
        else showToast(`Message sent (push: ${data.sent}/${data.total} delivered)`);
      } catch (e) {
        console.warn('Push failed (offline?):', e);
        showToast("Message saved — push unavailable offline");
      }
    }

    // ─── TACTICS CANVAS ──────────────────────────────────────────────────────
    let tacticsCtx = null, tacticsDrawing = false;
    let tacticsLastX = 0, tacticsLastY = 0, tacticsStartX = 0, tacticsStartY = 0;
    let tacticsTool = "pen", tacticsColor = "#ffffff", tacticsSnapshot = null;

    function initTacticsCanvas(sessionId) {
      const canvas = document.getElementById("tactics-canvas");
      if (!canvas) return;
      canvas.width  = canvas.offsetWidth || 540;
      canvas.height = 360;
      tacticsCtx = canvas.getContext("2d");
      const saved = state.tacticsDrawings?.[sessionId];
      if (saved) { const img = new Image(); img.onload = () => tacticsCtx.drawImage(img,0,0); img.src = saved; }
      const getXY = e => {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        const src = e.touches ? e.touches[0] : e;
        return [(src.clientX - r.left) * sx, (src.clientY - r.top) * sy];
      };
      const onDown = e => {
        e.preventDefault();
        tacticsDrawing = true;
        [tacticsStartX, tacticsLastX] = [getXY(e)[0], getXY(e)[0]];
        [tacticsStartY, tacticsLastY] = [getXY(e)[1], getXY(e)[1]];
        if (tacticsTool !== "pen" && tacticsTool !== "eraser") tacticsSnapshot = tacticsCtx.getImageData(0,0,canvas.width,canvas.height);
        tacticsCtx.beginPath(); tacticsCtx.arc(tacticsLastX,tacticsLastY,2,0,Math.PI*2);
        tacticsCtx.fillStyle = tacticsTool==="eraser" ? "#1e7a3e" : tacticsColor; tacticsCtx.fill();
      };
      const onMove = e => {
        if (!tacticsDrawing) return; e.preventDefault();
        const [x,y] = getXY(e);
        if (tacticsTool === "pen" || tacticsTool === "eraser") {
          tacticsCtx.beginPath(); tacticsCtx.moveTo(tacticsLastX,tacticsLastY); tacticsCtx.lineTo(x,y);
          tacticsCtx.strokeStyle = tacticsTool==="eraser" ? "#1e7a3e" : tacticsColor;
          tacticsCtx.lineWidth = tacticsTool==="eraser" ? 20 : 3; tacticsCtx.lineCap = "round"; tacticsCtx.stroke();
        } else if (tacticsTool === "circle" || tacticsTool === "arrow") {
          tacticsCtx.putImageData(tacticsSnapshot,0,0);
          tacticsCtx.beginPath(); tacticsCtx.strokeStyle = tacticsColor; tacticsCtx.lineWidth = 3;
          if (tacticsTool === "circle") {
            const r2 = Math.hypot(x-tacticsStartX, y-tacticsStartY);
            tacticsCtx.arc(tacticsStartX,tacticsStartY,r2,0,Math.PI*2);
          } else {
            const angle = Math.atan2(y-tacticsStartY, x-tacticsStartX), hl = 14;
            tacticsCtx.moveTo(tacticsStartX,tacticsStartY); tacticsCtx.lineTo(x,y);
            tacticsCtx.moveTo(x,y); tacticsCtx.lineTo(x-hl*Math.cos(angle-Math.PI/6),y-hl*Math.sin(angle-Math.PI/6));
            tacticsCtx.moveTo(x,y); tacticsCtx.lineTo(x-hl*Math.cos(angle+Math.PI/6),y-hl*Math.sin(angle+Math.PI/6));
          }
          tacticsCtx.stroke();
        }
        [tacticsLastX,tacticsLastY] = [x,y];
      };
      const onUp = e => {
        if (!tacticsDrawing) return; e.preventDefault(); tacticsDrawing = false;
        if (!state.tacticsDrawings) state.tacticsDrawings = {};
        state.tacticsDrawings[sessionId] = canvas.toDataURL();
        saveState("Tactics saved");
      };
      canvas.onmousedown=onDown; canvas.onmousemove=onMove; canvas.onmouseup=onUp; canvas.onmouseleave=onUp;
      canvas.ontouchstart=onDown; canvas.ontouchmove=onMove; canvas.ontouchend=onUp;
    }

    // ─── AVAILABILITY TEMPLATE HELPERS ───────────────────────────────────────
    // Turn a schedule name into a stable slug ID so the same name always
    // maps to the same record (upsert), while different names get their own.
    function scheduleSlug(prefix, name) {
      return prefix + '-' + (name || 'schedule')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '')
        .slice(0, 40);
    }

    function _resetScheduleForm() {

    async function saveAvailabilityTemplate() {
      const el      = document.getElementById("availTpl");
      const nameEl  = document.getElementById("tplName");
      const timeEl  = document.getElementById("autoTime");
      const msgBody = el?.value?.trim() || '';
      const sname   = nameEl?.value?.trim() || '';
      const stime   = timeEl?.value || '09:00';

      if (!sname) { notify('Please enter a schedule name first'); return; }
      if (!msgBody) { notify('Please enter a message first'); return; }

      state.availabilityTemplate  = msgBody;
      state.currentTemplateName   = sname;
      state.autoSendSchedule      = state.autoSendSchedule || {};
      state.autoSendSchedule.time = stime;
      state.autoSendEnabled       = true;

      // When editing an existing schedule use its original IDs so it updates
      // in place; when creating new use slug-based IDs so each name is unique.
      const isEditing = !!state._editingScheduleId;
      const tplId   = state._editingTemplateId  || scheduleSlug('tpl', sname);
      const schedId = state._editingScheduleId  || scheduleSlug('sch', sname);

      // ── Persist to backend ────────────────────────────────────────────────
      try {
        // 1. Upsert the template
        const tplRes = await fetch('/api/templates', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            id:       tplId,
            name:     sname,
            category: 'availability',
            title:    `Boitsfort RFC — ${sname}`,
            body:     msgBody,
          })
        });
        if (!tplRes.ok) throw new Error(await tplRes.text());

        // 2. Upsert the schedule
        const schedRes = await fetch('/api/schedules', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            id:         schedId,
            name:       sname,
            templateId: tplId,
            days:       state.autoSendSchedule?.days     || ['Mon'],
            day:        (state.autoSendSchedule?.days?.[0] || 'Mon').toLowerCase(),
            time:       stime,
            audience:   state.autoSendSchedule?.audience || 'all',
            active:     true,
            coachName:  currentUser()?.name || 'Coach',
          })
        });
        if (!schedRes.ok) throw new Error(await schedRes.text());

        // Reset form to blank ready for next new schedule
        _resetScheduleForm();
        state.templateCardCollapsed = true;
        saveState();
        render();
        setTimeout(loadLiveSchedules, 200);
        notify(isEditing ? `"${sname}" updated ✓` : `"${sname}" schedule created ✓`);
      } catch (err) {
        console.warn('[saveAvailabilityTemplate] Backend sync failed:', err.message);
        _resetScheduleForm();
        state.templateCardCollapsed = true;
        saveState();
        render();
        notify('Saved locally ✓');
      }
    }

      const blocks = (state.trainingBlocks||{})[sessId] || [];

    async function joinSquad() {
      const code = (document.getElementById('joinCode')?.value || '').trim().toUpperCase();
      const name = (document.getElementById('joinName')?.value || '').trim();
      const expected = (state.teamCode || 'BOITSFORT').toUpperCase();
      if (code !== expected) { showToast('❌ Wrong team code — ask your coach'); return; }
      if (!name) { showToast('Enter your name first'); return; }

      // Add to player roster if not already there
      let player = state.players.find(p => p.name.toLowerCase() === name.toLowerCase());
      if (!player) {
        const id = 'p' + Date.now();
        player = { id, name, position: 'TBC', status: 'no-reply', game: 'no-reply',
          phone: '', email: '', trainingTuesday: 'no-reply', trainingThursday: 'no-reply',
          attendance: 0, history: [], blockedDates: [], medical: '',
          mediaConsent: false, contractStatus: 'active' };
        state.players.push(player);
      }

      // Create a user account for this player (if not exists)
      let userAcc = state.users.find(u => u.role === 'player' && u.name.toLowerCase() === name.toLowerCase());
      if (!userAcc) {
        userAcc = { id: 'player-' + Date.now(), role: 'player', name, email: '', phone: '', pin: '', playerId: player.id };
        state.users.push(userAcc);
      }

      // Log in as this player
      state.currentUserId = userAcc.id;
      state.activeView = 'player';
      state.selectedPlayerId = player.id;
      saveState('Player joined via team code');

      // Subscribe to push with their real name as the label
      try {
        await subscribePush(name);
      } catch(e) { console.warn('Push subscription optional step failed:', e); }

      showToast(`Welcome ${name}! You're all set 🏉`);
      setSection('player', 'availability');
    }

    function loginAs(userId) {
      const user = state.users.find(u => u.id === userId);
      if (!user) return notify("Account not found");
      state.currentUserId = user.id;
      if (user.role === "player") {
        state.activeView = "player";
        state.selectedPlayerId = user.playerId;
        state.selectedMessagePlayerId = user.playerId;
      } else {
        state.activeView = "coach";
      }
      notify(`Logged in as ${user.name}`);
    }

    function loginWithForm() {
      const identityEl = document.getElementById("loginIdentity");
      const pinEl      = document.getElementById("loginPin");
      if (!identityEl || !pinEl) return notify("Login form unavailable");
      const identity = identityEl.value.trim().toLowerCase();
      const pin      = pinEl.value.trim();
      const user = state.users.find(u =>
        (u.email.toLowerCase() === identity || u.phone === identity) && u.pin === pin
      );
      if (!user) return notify("Login failed. Use one of the test accounts.");
      loginAs(user.id);
    }

      const slot     = document.getElementById('audience-picker-slot');

        slot.innerHTML = `<label style="font-size:12px;font-weight:700;color:var(--muted);display:grid;gap:4px;width:100%">Player
          <select id="messagePlayer" style="padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px">
            ${state.players.map(p => `<option value="${p.id}">${p.name}</option>`).join("")}
          </select></label>`;
      } else if (audience === 'no-reply') {
        const noReply = state.players.filter(p => {
          const selected = state.schedule.find(s => s.id === (state.messageDetail || 'tue')) || state.schedule[0];
          const k = selected ? sessionKey(selected.id) : 'game';
          return (p[k]||'no-reply') === 'no-reply';
        });
        slot.innerHTML = noReply.length
          ? `<label style="font-size:12px;font-weight:700;color:var(--muted);display:grid;gap:4px;width:100%">Target

              </div></label>`

        slot.innerHTML = '';

    function setMessagePlayer(playerId) {
      if (!isCoach()) return notify("Players can only view their own profile");
      state.selectedMessagePlayerId = playerId;
      saveState("Player detail selected");
      render();
    }

    function getMessageRecipients(audience, playerId) {
      if (audience === "individual") return state.players.filter(p => p.id === playerId);
      if (audience === "available")  return byStatus("available");
      if (audience === "no-reply")   return byStatus("no-reply");
      return state.players;
    }

    function createCoachMessage({recipients, type, body, sessionId = "week"}) {
      const unique = [...new Map(recipients.map(p => [p.id, p])).values()];
      const created = unique.map(p => ({
        id:       `m${Date.now()}-${p.id}-${Math.random().toString(16).slice(2)}`,
        from:     "Coach",
        to:       p.name,
        playerId: p.id,
        sessionId,
        type,
        text:     body.replaceAll("{{firstName}}", p.name.split(" ")[0]),
        unread:   true,
        time:     "Just now",
        delivery: "delivered to app",
        replies:  []
      }));
      state.messages.unshift(...created);
      return created;
    }

    function sendAvailabilityRequest(sessionId) {
      if (!isCoach()) return notify("Only coaches can send availability requests");
      const session = state.schedule.find(s => s.id === sessionId);
      if (!session) return;
      const body = `Please confirm your availability for ${session.title} (${session.date}) inside Coach's Eye.`;
      const created = createCoachMessage({ recipients: state.players, type: "Availability request", body, sessionId });
      state.availabilityRequests.unshift({
        id: `req-${Date.now()}`,
        sessionId,
        title:   session.title,
        sentAt:  new Date().toLocaleString([], {dateStyle:"medium", timeStyle:"short"}),
        status:  "sent",
        messageIds: created.map(m => m.id)
      });
      // Push delivery is persisted by the backend; a future native app can
      // reuse this same sessionId/response workflow without changing the UI.
      sendPushToPlayers(`Availability request - ${session.title}`, body, { type: 'availability', sessionId });
      notify(`${session.title} request sent to ${created.length} player accounts`);
    }

    function sendInAppMessage() {
      if (!isCoach()) return notify("Only coaches can send squad messages");
      const bodyEl     = document.getElementById("messageBody");
      const typeEl     = document.getElementById("requestType");
      const audienceEl = document.getElementById("messageAudience");
      const playerEl   = document.getElementById("messagePlayer");
      const body       = bodyEl ? bodyEl.value.trim() : "";
      if (!body) return notify("Write a message before sending");
      const type       = typeEl     ? typeEl.value     : "Coach announcement";
      const audience   = audienceEl ? audienceEl.value : "squad";
      const playerId   = playerEl   ? playerEl.value   : "";
      const recipients = getMessageRecipients(audience, playerId);
      // Resolve targetLabel for individual sends — match by player name (push label)
      let targetLabel;
      if (audience === 'individual' && playerId) {
        const target = state.players.find(p => p.id === playerId);
        if (target) targetLabel = target.name;
      }
      const created = createCoachMessage({ recipients, type, body });
      const pushType = type.toLowerCase().includes('availability') ? 'availability' : 'message';
      sendPushToPlayers(`Coach - ${type}`, body, {
        targetLabel,
        audience: audience === 'no-reply' ? 'no-reply' : 'all',
        type: pushType,
        sessionId: state.messageDetail || 'game'
      });
      notify(`${created.length} message${created.length===1?"":"s"} sent to player app`);
    }

    function toggleAutomation(id) {
      if (!isCoach()) return notify("Only coaches can change automation rules");
      const rule = state.automationRules.find(r => r.id === id);
      if (!rule) return;
      rule.enabled = !rule.enabled;
      notify(`${rule.title} ${rule.enabled ? "enabled" : "paused"}`);
    }

    function runAutomationNow(id) {
      if (!isCoach()) return notify("Only coaches can run automated requests");
      const rule    = state.automationRules.find(r => r.id === id);
      if (!rule) return;
      const session = state.schedule.find(s => s.id === rule.sessionId);
      const body    = `${rule.template} (${session ? session.date : "This week"})`;
      const created = createCoachMessage({ recipients: state.players, type: "Automated availability request", body, sessionId: rule.sessionId });
      sendPushToPlayers(`Automated - ${rule.title}`, body, { type: 'availability', sessionId: rule.sessionId });
      notify(`${rule.title} sent to ${created.length} player apps`);
    }

    function markAllRead() {
      if (!isCoach()) return notify("Only coaches can mark the coach inbox read");
      state.messages = state.messages.map(m =>
        m.to === "Coach" ? { ...m, unread: false, delivery: "read by coach" } : m

      notify("Coach inbox marked read");

    function requestMedical(playerId) {
      if (!isCoach()) return notify("Only coaches can request medical check-ins");
      const player = state.players.find(p => p.id === playerId);
      if (!player) return notify("Player not found");
      state.messages.unshift({
        id: `m${Date.now()}`, from: "Medical", to: player.name, playerId: player.id,
        sessionId: "medical", type: "Medical check-in request",
        text: "Please update your injury status, treatment plan, and weekend availability in Coach's Eye.",
        unread: true, time: "Just now", delivery: "delivered to app", replies: []
      });
      sendPushToPlayers("Medical check-in", `${player.name} — please update your injury status in Coach's Eye.`);
      notify(`Medical check-in sent to ${player.name}`);
    }

    function availabilityBlock(player, key, label) {
      const current = player[key] || 'no-reply';
      const statusColors = {
        available:   { bg:'#16a34a', border:'#16a34a', text:'#fff' },
        unavailable: { bg:'#dc2626', border:'#dc2626', text:'#fff' },
        maybe:       { bg:'#d97706', border:'#d97706', text:'#fff' },
        injured:     { bg:'#7c3aed', border:'#7c3aed', text:'#fff' },
        'no-reply':  { bg:'#f3f4f6', border:'#d1d5db', text:'#6b7280' },
      };
      const c = statusColors[current] || statusColors['no-reply'];
      return `
        <div style="border:2px solid ${c.border};border-radius:14px;padding:18px 20px;margin-bottom:14px;background:${c.bg}18">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
            <strong style="font-size:16px">${label}</strong>
            <span style="background:${c.bg};color:${c.text};font-size:12px;font-weight:800;padding:4px 12px;border-radius:999px">${statusLabel(current)}</span>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">

              style="padding:18px 10px;border-radius:12px;font-size:15px;font-weight:800;border:3px solid #16a34a;
