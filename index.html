              ✅ Yes, I'm coming
            </button>
            <button type="button" onclick="setPlayerAvailability('${key}','unavailable')"
              style="padding:18px 10px;border-radius:12px;font-size:15px;font-weight:800;border:3px solid #dc2626;
                background:${current==='unavailable'?'#dc2626':'#fff'};color:${current==='unavailable'?'#fff':'#dc2626'};cursor:pointer;transition:all 0.15s">
              ❌ Can't make it
            </button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <button type="button" onclick="setPlayerAvailability('${key}','maybe')"
              style="padding:12px 10px;border-radius:10px;font-size:13px;font-weight:700;border:2px solid #d97706;
                background:${current==='maybe'?'#d97706':'#fff'};color:${current==='maybe'?'#fff':'#d97706'};cursor:pointer">
              🤔 Maybe
            </button>
            <button type="button" onclick="setPlayerAvailability('${key}','injured')"
              style="padding:12px 10px;border-radius:10px;font-size:13px;font-weight:700;border:2px solid #7c3aed;
                background:${current==='injured'?'#7c3aed':'#fff'};color:${current==='injured'?'#fff':'#7c3aed'};cursor:pointer">
              🤕 Injured
            </button>
          </div>
        </div>`;
    }

    function setAllAvailable() {
      const player = getPlayer();
      if (!player.id) return;
      ['trainingTuesday','trainingThursday','game'].forEach(key => {
        player[key] = 'available';
      });
      if (player.history[0] !== 'available') player.history.unshift('available');
      player.history = player.history.slice(0, 5);
      // Also POST to server so coach sees it
      navigator.serviceWorker?.ready.then(reg => reg.pushManager.getSubscription()).then(sub => {
        if (!sub) return;
        const endpoint = sub.endpoint;
        ['tue','thu','game'].forEach(sessionId => {
          fetch('/api/availability', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ endpoint, response: 'available', sessionId })
          }).catch(() => {});
        });
      }).catch(() => {});
      saveState('All available set');
      render();
      showToast("✅ All set — see you this week!");
    }

    function setPlayerAvailability(key, status) {
      const player    = getPlayer();
      const sessionId = keyToSessionId(key);
      player[key]     = status;
      if (key === "game" && player.history[0] !== status) player.history.unshift(status);
      player.history  = player.history.slice(0, 5);
      addMasterFeed(`${player.name} updated ${sessionTitle(sessionId)}`, statusLabel(status));
      upsertAvailabilityResponseMessage(player, sessionId, status);
      // POST to server so coach sees it in real time
      navigator.serviceWorker?.ready.then(reg => reg.pushManager.getSubscription()).then(sub => {
        if (!sub) return;
        // Injury remains a medical status in the app; push action responses
        // intentionally use the availability values supported by the API.
        if (status === 'injured') return;
        fetch('/api/availability', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint, response: status, sessionId })
        }).catch(() => {});
      }).catch(() => {});
      saveState("Player availability saved");
      render();
      showToast("Availability saved ✓");
    }

    function upsertAvailabilityResponseMessage(player, sessionId, status) {
      const text     = `${player.name} responded ${statusLabel(status)} for ${sessionTitle(sessionId)}.`;
      const existing = state.messages.find(m =>
        m.type === "Availability response" && m.playerId === player.id && m.sessionId === sessionId
      );
      if (existing) {
        // Critical duplicate guard: repeat taps update the existing coach response row
        existing.text     = text;
        existing.unread   = true;
        existing.time     = "Just now";
        existing.delivery = "updated by player";
        existing.replies  = existing.replies || [];
        return existing;
      }
      const created = {
        id: `m${Date.now()}-availability-${player.id}-${sessionId}`,
        from: player.name, to: "Coach", playerId: player.id, sessionId,
        type: "Availability response", text,
        unread: true, time: "Just now", delivery: "received by coach", replies: []
      };
      state.messages.unshift(created);
      return created;
    }

    function addBlockedDate() {
      const dateEl   = document.getElementById("blockDate");
      const reasonEl = document.getElementById("blockReason");
      if (!dateEl) return;
      const date   = dateEl.value;
      const reason = (reasonEl ? reasonEl.value.trim() : "") || "Unavailable";
      if (!date) return notify("Choose a date before saving");
      const player = getPlayer();
      player.blockedDates = player.blockedDates || [];
      player.blockedDates.push({ date, reason });
      saveState("Blocked date saved");
      render();
      showToast("Blocked date saved ✓");
    }

    // ─── PLAYER MESSAGES ─────────────────────────────────────────────────────
    function renderPlayerMessages() {
      const player   = getPlayer();
      if (!player.id) { document.getElementById("player-messages").innerHTML = noSquadMsg(); return; }
      const messages = state.messages.filter(m => m.to === "Squad" || m.to === player.name || m.from === player.name);
      const supported = ('serviceWorker' in navigator) && ('PushManager' in window);
      const permission = supported ? Notification.permission : 'default';

      let pushBannerHtml = "";
      if (supported) {
        if (pushSubscription) {
          pushBannerHtml = `
            <div class="push-banner push-subscribed">
              <div class="push-icon">🔔</div>

          pushBannerHtml = `
            <div class="push-banner push-denied">
              <div class="push-icon">🔕</div>
              <div class="push-text">
                <strong>Notifications blocked</strong>
                <small>Go to browser site settings to re-enable.</small>
              </div>
            </div>`;
        } else {
          pushBannerHtml = `
            <div class="push-banner">
              <div class="push-icon">🔔</div>
              <div class="push-text">
                <strong>Enable push notifications</strong>
                <small>Get notified on your phone when coach sends a message or selection update.</small>
              </div>
              <button class="btn primary" type="button" onclick="subscribePush('${player.name}')">Enable</button>
            </div>`;
        }
      }

      document.getElementById("player-messages").innerHTML = `
        <div class="card">
          <h2>My messages</h2>
          <p class="muted">Player inbox — announcements, requests and replies.</p>
          ${pushBannerHtml}
          <div class="button-row" style="margin-top:12px">
            <button class="btn" type="button" onclick="markPlayerMessagesRead()">Mark my messages read</button>
            <button class="btn primary" type="button" onclick="quickPlayerReply('I have seen this and will update my availability.')">Quick reply to coach</button>
          </div>
          <div class="list" style="margin-top:14px">
            ${messages.map(m => `
              <div class="message-bubble ${m.unread?"unread":""}">
                <div class="message-meta"><span>${m.type} · ${m.delivery||"delivered"}</span><span>${m.time}</span></div>
                <strong>${m.from}</strong>
                <p class="muted">${m.text}</p>
                ${(m.replies||[]).map(r=>`<div class="message-bubble" style="margin-top:7px"><div class="message-meta"><span>Reply sent</span><span>${r.time}</span></div><strong>${r.from}</strong><p class="muted">${r.text}</p></div>`).join("")}
                <div class="thread-reply">
                  <input id="reply-${m.id}" placeholder="Reply to coach...">
                  <button class="btn" type="button" onclick="sendPlayerReply('${m.id}')">Send</button>
                </div>
              </div>`).join("")}
          </div>
        </div>`;

    function markPlayerMessagesRead() {
      const player = getPlayer();
      state.messages = state.messages.map(m => {
        if (m.to === "Squad" || m.to === player.name)
          return { ...m, unread: false, delivery: "read by player" };
        return m;
      });
      notify(`${player.name} marked messages read`);
    }

    function sendPlayerReply(messageId) {
      const player = getPlayer();
      const input  = document.getElementById(`reply-${messageId}`);
      const text   = input ? input.value.trim() : "";
      if (!text) return notify("Write a reply before sending");
      const message = state.messages.find(m => m.id === messageId);
      if (!message) return;
      const canReply = message.to === "Squad" || message.to === player.name || message.from === player.name;
      if (!canReply) return notify("Players can only reply to their own messages");
      message.replies = message.replies || [];
      message.replies.push({ from: player.name, text, time: "Just now" });
      message.unread   = false;
      message.delivery = "player replied";
      state.messages.unshift({
        id:        `m${Date.now()}-reply`,
        from:      player.name,
        to:        "Coach",
        playerId:  player.id,
        sessionId: message.sessionId || "week",
        type:      "Player reply",
        text,
        unread:    true,
        time:      "Just now",
        delivery:  "received by coach",
        replies:   []
      });
      addMasterFeed(`${player.name} replied to coach`, text);
      saveState("Player reply sent");
      render();
    }

    function quickPlayerReply(text) {
      const player = getPlayer();
      state.messages.unshift({
        id:        `m${Date.now()}-quick`,
        from:      player.name,
        to:        "Coach",

    async function loadLiveMessaging() {
      renderPushStatusCard();
      loadLiveSchedules();
      loadLiveTemplates();

      // Pull live availability from Redis into the session detail panels
      await refreshLiveAvailability();

    // Pull player availability from Redis and update state.players + re-render session detail
    async function refreshLiveAvailability() {
      const btn = document.getElementById('avail-refresh-btn');
      const ts  = document.getElementById('avail-refresh-ts');
      if (btn) { btn.disabled = true; btn.textContent = '↺ Refreshing…'; }
      try {
        const [tueData, thuData, gameData] = await Promise.all([
          fetch('/api/availability?sessionId=tue').then(r => r.json()).catch(() => ({ responses: [] })),
          fetch('/api/availability?sessionId=thu').then(r => r.json()).catch(() => ({ responses: [] })),
          fetch('/api/availability?sessionId=game').then(r => r.json()).catch(() => ({ responses: [] })),
        ]);
        // Build label (lowercased) → { tue, thu, game }
        const byLabel = {};
        const apply = (list, sid) => (list || []).forEach(({ label, response }) => {
          const k = label.toLowerCase();
          if (!byLabel[k]) byLabel[k] = {};
          byLabel[k][sid] = response;
        });
        apply(tueData.responses,  'tue');
        apply(thuData.responses,  'thu');
        apply(gameData.responses, 'game');
        // Patch state.players with live data
        // Match by: 1) exact name, 2) first name only (handles "Nick Champion of the Universe" → "Nick Murphy")
        let changed = false;
        state.players.forEach(p => {
          const nameLower   = p.name.toLowerCase();
          const firstName   = nameLower.split(' ')[0];
          // Exact match first, then first-name fallback
          let live = byLabel[nameLower];
          if (!live) {
            const fallbackKey = Object.keys(byLabel).find(k => k.split(' ')[0] === firstName);
            if (fallbackKey) live = byLabel[fallbackKey];
          }
          if (!live) return;
          if (live.tue  !== undefined && p.trainingTuesday  !== live.tue)  { p.trainingTuesday  = live.tue;  changed = true; }
          if (live.thu  !== undefined && p.trainingThursday !== live.thu)  { p.trainingThursday = live.thu;  changed = true; }
          if (live.game !== undefined && p.game             !== live.game) { p.game              = live.game; changed = true; }
        });
        if (changed) saveState('Live availability synced');
        // Update timestamp label
        if (ts) ts.textContent = `Live · ${new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}`;
        // Re-render the session detail panels inline (avoids full re-render flash)
        renderMessageCenter();
      } catch(e) {
        console.warn('[refreshLiveAvailability]', e);
        if (ts) ts.textContent = 'Refresh failed';
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '↺ Refresh'; }
      }
    }

    async function loadLiveResponses() {
      const panel = document.getElementById("live-responses-panel");
      if (!panel) return;
      try {
        // Load responses for all sessions
        const sessions = [
          { id: 'game',  label: 'Saturday match' },
          { id: 'tue',   label: 'Tuesday training' },
          { id: 'thu',   label: 'Thursday training' },
        ];
        const allResults = await Promise.all(
          sessions.map(s => fetch(`/api/availability?sessionId=${s.id}`).then(r => r.json()).then(d => ({ ...s, responses: d.responses || [] })))
        );
        const hasAny = allResults.some(s => s.responses.length > 0);

          panel.innerHTML = `<p class="muted" style="font-size:13px">No responses yet — send an availability request and players can reply directly from the notification.</p>`;
          return;
        }
        panel.innerHTML = allResults.filter(s => s.responses.length > 0).map(s => {
          const yes = s.responses.filter(r => r.response === 'available');
          const no  = s.responses.filter(r => r.response === 'unavailable');
          const mbe = s.responses.filter(r => r.response === 'maybe');
          return `
            <div style="margin-bottom:14px">

                <span style="background:rgba(248,113,113,0.12);color:#f87171;font-weight:700;font-size:11px;padding:3px 8px;border-radius:999px">❌ ${no.length} can't</span>
                ${mbe.length ? `<span style="background:rgba(245,158,11,0.12);color:#fbbf24;font-weight:700;font-size:11px;padding:3px 8px;border-radius:999px">🤔 ${mbe.length} maybe</span>` : ''}
              </div>
              <div style="margin-top:6px">

                  <div class="live-sched-row" style="display:flex;align-items:center;justify-content:space-between;padding:6px 0">
                    <span style="font-size:13px">${esc(r.label)}</span>
                    <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;
                      background:${r.response==='available'?'rgba(52,211,153,0.12)':r.response==='unavailable'?'rgba(248,113,113,0.12)':'rgba(245,158,11,0.12)'};
                      color:${r.response==='available'?'#34d399':r.response==='unavailable'?'#f87171':'#fbbf24'}">
                      ${r.response==='available'?'✅ Coming':r.response==='unavailable'?'❌ Can\'t':'🤔 Maybe'}
                    </span>
                  </div>`).join('')}
              </div>
            </div>`;
        }).join('');
      } catch (err) {

      }

    async function renderPushStatusCard() {
      const card = document.getElementById("push-status-card");
      if (!card) return;

      const supported = ('serviceWorker' in navigator) && ('PushManager' in window);
      const permission = supported ? Notification.permission : 'unsupported';

      // Fetch subscriber count from server
      let subscriberCount = '…';
      try {
        const res = await fetch('/api/subscribe');
        const d   = await res.json();
        subscriberCount = d.count ?? 0;
      } catch { subscriberCount = '?'; }

      if (!supported) {
        card.style.borderColor = 'rgba(245,158,11,0.25)';
        card.style.background  = 'rgba(245,158,11,0.06)';
        card.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:22px">⚠️</span>
            <div>
              <strong style="font-size:14px">Push not supported in this browser</strong>
              <p class="muted" style="font-size:12px;margin:2px 0 0">Use Chrome or Firefox on desktop, or Safari/Chrome on phone.</p>
            </div>
          </div>`;
        return;
      }

      if (permission === 'denied') {
        card.style.borderColor = 'rgba(239,68,68,0.25)';
        card.style.background  = 'rgba(239,68,68,0.05)';
        card.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:22px">🔕</span>
            <div style="flex:1">
              <strong style="font-size:14px">Notifications blocked for this browser</strong>
              <p class="muted" style="font-size:12px;margin:2px 0 6px">Go to your browser / OS settings → Notifications → allow this site.</p>
              <span class="muted" style="font-size:11px">📱 ${subscriberCount} device${subscriberCount===1?'':'s'} subscribed across all players</span>
            </div>
          </div>`;
        return;
      }

      if (pushSubscription) {
        card.style.borderColor = '#22c55e';
        card.style.background  = '#f0fdf4';
        card.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:22px">🔔</span>
              <div>
                <strong style="font-size:14px;color:var(--green)">This device is subscribed ✓</strong>
                <p class="muted" style="font-size:12px;margin:2px 0 0">📱 ${subscriberCount} device${subscriberCount===1?'':'s'} total — messages go to all of them</p>
              </div>
            </div>
            <button class="btn" type="button" onclick="unsubscribePush()" style="font-size:12px;color:#dc2626;border-color:#fca5a5">Turn off this device</button>
          </div>`;
        return;

          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:22px">🔕</span>
            <div>
              <strong style="font-size:14px">Enable notifications on this device</strong>
              <p class="muted" style="font-size:12px;margin:2px 0 0">You'll receive messages when players subscribe and when you send a test.</p>
              <p class="muted" style="font-size:11px;margin:3px 0 0">📱 ${subscriberCount} device${subscriberCount===1?'':'s'} already subscribed</p>
            </div>

            🔔 Enable notifications

    async function sendTemplateNow(templateId) {
      try {
        const res  = await fetch('/api/templates');
        const data = await res.json();
        const tpl  = (data.templates || []).find(t => t.id === templateId);
        if (!tpl) { notify('Template not found'); return; }
        notify('📤 Sending…');
        await sendPushToPlayers(tpl.title || tpl.name, tpl.body, {
          type: tpl.category === 'availability' ? 'availability' : 'message',
          sessionId: 'game'
        });
        notify(`✅ "${tpl.name}" sent to squad`);
      } catch(e) {
        notify('Send failed: ' + e.message);
      }
    }

          _local: true,
          title:  m.from || 'Coach',
          body:   m.text,
          sentAt: m.time,
          type:   m.type || 'adhoc',

          panel.innerHTML = `<p class="muted" style="font-size:13px">No messages sent yet.</p>`;

    async function toggleLiveSchedule(id, active) {
      try {
        await fetch('/api/schedules', {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ id, active }),
        });
        loadLiveSchedules();
      } catch (err) {
        notify("Could not update schedule: " + err.message);
      }
    }

    async function deleteLiveSchedule(id) {
      if (!confirm('Delete this schedule? It will stop sending.')) return;
      try {
        await fetch('/api/schedules', {
          method:  'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ id }),
        });
        loadLiveSchedules();
        notify('Schedule deleted');
      } catch (err) {
        notify('Could not delete: ' + err.message);
      }
    }

    // Fire a schedule's template immediately (bypasses cron timing — useful for testing)
    async function fireScheduleNow(scheduleId) {
      try {
        const [schedRes, tplRes] = await Promise.all([
          fetch('/api/schedules').then(r => r.json()),
          fetch('/api/templates').then(r => r.json()),
        ]);
        const sched = (schedRes.schedules || []).find(s => s.id === scheduleId);
        const tpl   = sched && (tplRes.templates || []).find(t => t.id === sched.templateId);
        if (!tpl) { notify('Template not found'); return; }
        notify('📤 Sending…');
        await sendPushToPlayers(tpl.title || tpl.name, tpl.body, {
          audience: sched.audience || 'all',
          type: tpl.category === 'availability' ? 'availability' : 'message',
          sessionId: sched.sessionId || 'game'
        });
        notify(`✅ "${tpl.name}" sent to squad`);
      } catch(e) {
        notify('Send failed: ' + e.message);
      }
    }

    // HTML-escape helper used in live panels (prevents XSS from stored data)
    function esc(str) {
      return String(str || '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ─── EVENT LISTENERS ──────────────────────────────────────────────────────
    document.getElementById("coachViewBtn").addEventListener("click", () => setView("coach"));
    document.getElementById("playerViewBtn").addEventListener("click", () => setView("player"));
    document.getElementById("resetBtn").addEventListener("click", async () => {
      if (!confirm("Reset everything? This clears all players, sessions and push subscriptions. Cannot be undone.")) return;
      state = normalizeState(structuredClone(defaultState));
      saveState("Full reset");
      // Clear push subscriptions from server so old test devices don't receive messages
      try {
        const subs = await fetch('/api/subscribe').then(r => r.json());
        if (subs.count > 0) {
          // GET returns count — can't bulk-delete, but a fresh deploy clears Redis on next subscribe
          // Just notify the coach
          notify("App reset. Re-enable notifications on each device to re-subscribe.");
        }
      } catch { /* offline */ }
      render();
    });

    window.addEventListener("storage", event => {
      if (event.key !== STORAGE_KEY || !event.newValue) return;
      const incoming = safeParseState(event.newValue, "storage event");
      if (!incoming) return;
      const incomingRev = Number(incoming.meta?.revision || 0);
      const currentRev  = Number(state.meta?.revision || 0);
      if (incomingRev <= currentRev) return;
      // Critical multi-tab guard: newer revision in another tab refreshes this tab's state
      state = normalizeState(incoming);
      const el = document.getElementById("saveStatus");
      if (el) el.textContent = `Synced newer browser tab · rev ${incomingRev}`;
      render();
    });

    // ─── BOOT ─────────────────────────────────────────────────────────────────
    // Deep-link routing — notification "Open app" links include ?to=availability
    // which sends the player directly to the right page
    (function handleDeepLink() {
      const params = new URLSearchParams(window.location.search);
      const to = params.get('to');
      if (to === 'availability') {
        state.activeView = 'player';
        state.activePlayerSection = 'availability';
        saveState();
        // Clean the URL without reloading
        history.replaceState({}, '', '/');
      }
    })();

    // Listen for messages from the service worker (e.g. "navigate to availability")
    navigator.serviceWorker?.addEventListener('message', event => {
      if (event.data?.type === 'navigate' && event.data.to === 'availability') {
        setSection('player', 'availability');
      }
    });

    render();
    initServiceWorker();
  </script>
</body>
</html>
