name: Availability automation cron

# Why this exists
# ----------------
# Weekly Availability sends fire from /api/cron when a session's scheduled time
# has passed on its day. Vercel Hobby crons only run on a DAILY frequency, so a
# schedule like "Sunday 11:50" would not fire until the next daily run. This
# workflow pings the SAME /api/cron endpoint every 5 minutes so scheduled sends
# go out within minutes of their time, with no coach action. Per-session de-dup
# in the scheduler means hitting it often never double-sends. The endpoint runs
# the identical path as the coach's "Run scheduler check now" button.
#
# IMPORTANT: GitHub only runs `schedule` triggers from the DEFAULT branch (main).
# This file must live on main for the 5-minute cron to fire; on a feature branch
# it can still be run manually via "Run workflow" (workflow_dispatch).
#
# One-time setup (required to authenticate):
#   GitHub → repo Settings → Secrets and variables → Actions → New repository secret
#     Name:  CRON_SECRET
#     Value: the same value as the Vercel project's CRON_SECRET env var
# (Repo is public → Actions minutes are free.)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: availability-cron
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger /api/cron (real scheduler path)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET repo secret is not set — see this workflow's header for setup."
            exit 1
          fi
          # ?source=github-actions tags the Automation Status diagnostics.
          curl -fsS --max-time 60 -X POST \
            "https://boitsfort-coachseye.vercel.app/api/cron?source=github-actions" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}'
